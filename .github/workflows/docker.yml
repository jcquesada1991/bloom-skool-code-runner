name: Build Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build local smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: bloom-skool-code-runner:smoke
      - name: Smoke test health server
        run: |
          docker run -d --name smoke -p 8080:8080 -e RUN_ON_START=false bloom-skool-code-runner:smoke
          sleep 5
          curl -fsS http://127.0.0.1:8080/health
          docker logs smoke
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/jcquesada1991/bloom-skool-code-runner:latest